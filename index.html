<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Spain Solutions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D0D0D;
      color: #fff;
      font-family: -apple-system, 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 2px solid #CCFF00;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 900;
      color: #CCFF00;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }

    .name {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-align: center;
    }

    .sub {
      font-size: 13px;
      color: #888;
      text-align: center;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, opacity 0.15s;
      cursor: pointer;
    }

    .btn:hover { transform: scale(1.02); opacity: 0.92; }
    .btn:active { transform: scale(0.98); }

    .btn-dark {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #2a2a2a;
    }

    .btn-lime {
      background: #CCFF00;
      color: #000;
      border: none;
    }

    .btn-gray {
      background: #161616;
      color: #888;
      border: 1px solid #222;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #222;
      margin: 4px 0;
    }

    .footer {
      font-size: 11px;
      color: #444;
      text-align: center;
      margin-top: 8px;
    }

    .footer span { color: #CCFF00; }
  </style>
</head>
<body>
  <div class="card">

    <div class="avatar">ESS</div>

    <div class="name">Daniil Pavlovskyi</div>
    <div class="sub">Easy Spain Solutions · Испания под ключ 🇪🇸</div>

    <a class="btn btn-dark" href="https://wa.me/34641048296?text=ДОВЕРКА">
      📄 &nbsp; Нужна доверенность
    </a>

    <a class="btn btn-dark" href="https://wa.me/34641048296?text=БАНК">
      🏦 &nbsp; Открыть / разблокировать счёт
    </a>

    <a class="btn btn-dark" href="https://wa.me/34641048296?text=ВНЖ">
      📋 &nbsp; Вопрос по ВНЖ / статусу
    </a>

    <a class="btn btn-lime" href="https://wa.me/34641048296?text=ЧЕКЛИСТ">
      🎁 &nbsp; Бесплатный чеклист для банка
    </a>

    <div class="divider"></div>

    <a class="btn btn-gray" href="https://wa.me/34641048296?text=Привет">
      💬 &nbsp; Другой вопрос
    </a>

    <div class="footer">
      WhatsApp <span>+34 641 048 296</span> · EASY SPAIN
    </div>

  </div>
</body>
</html>
